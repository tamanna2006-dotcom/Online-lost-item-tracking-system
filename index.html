<!DOCTYPE html>
<html>
<head>
    <title>Lost Item Tracker</title>

    <link rel="stylesheet" href="style.css">

    <style>
        .home-box {
            background: white;
            width: 350px;
            margin: 120px auto;
            padding: 30px;
            border-radius: 12px;
            text-align: center;
        }

        .home-box h1 {
            margin-bottom: 10px;
        }

        .home-box p {
            color: gray;
            margin-bottom: 20px;
        }

        .home-btn {
            padding: 12px;
            width: 90%;
            border: none;
            border-radius: 25px;
            background: #667eea;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        .home-btn:hover {
            background: #5a67d8;
        }
    </style>

</head>
<body>

<div class="home-box">

    <h1>Lost Item Tracker</h1>
    <p>Campus Lost & Found System</p>

    <button class="home-btn" onclick="checkLocation()">
        Enter Website
    </button>

</div>

<script src="script .js"></script>
</body>
</html>
