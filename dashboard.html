<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <link rel="stylesheet" href="style.css">

    <style>
        .home-box {
            background: white;
            width: 350px;
            margin: 120px auto;
            padding: 30px;
            border-radius: 12px;
            text-align: center;
        }

        .home-box h2 {
            margin-bottom: 20px;
        }

        .home-btn {
            display: block;
            width: 90%;
            padding: 12px;
            margin: 10px auto;
            border: none;
            border-radius: 25px;
            background: #667eea;
            color: white;
            cursor: pointer;
        }

        .home-btn:hover {
            background: #5a67d8;
        }
    </style>

</head>
<body>

<div class="home-box">

    <h2>Dashboard</h2>

    <a href="report_lost.html" class="home-btn">
        Report Lost Item
    </a>

    <a href="report_found.html" class="home-btn">
        Report Found Item
    </a>

    <a href="view.html" class="home-btn">
        View Items
    </a>

</div>

<script src="script .js"></script>
</body>
</html
