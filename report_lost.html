<!DOCTYPE html>
<html>
<head>
    <title>Report Lost Item</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="form-box">
    <h2>Report Lost Item</h2>
    <p>Please fill details carefully</p>

    <form onsubmit="return validateForm()">

        <h3>Contact Details</h3>

        <input type="email" placeholder="Email" required>
        <input type="tel" id="phone" placeholder="Phone (10 digits)" pattern="[0-9]{10}" maxlength="10" required>

        <h3>Item Details</h3>

        <input type="text" placeholder="Item Name" maxlength="30" required>

        <input type="text" placeholder="Category" maxlength="30" required>

        <input type="text" placeholder="Last Seen Location" maxlength="50" required>

        <!-- DATE -->
        <label for="date">Date</label>
        <input type="date" id="date" required>

        <!-- TIME -->
        <label for="time">Time</label>
        <input type="time" id="time" required>

        <textarea placeholder="Description" maxlength="150"></textarea>

        <button type="submit">Submit</button>
    </form>
</div>

<script>
// populate current date and time when the page loads
window.addEventListener('DOMContentLoaded', () => {
    const dateInput = document.getElementById('date');
    const timeInput = document.getElementById('time');
    if (dateInput) {
        const today = new Date();
        const yyyy = today.getFullYear();
        const mm = String(today.getMonth()+1).padStart(2,'0');
        const dd = String(today.getDate()).padStart(2,'0');
        dateInput.value = ${yyyy}-${mm}-${dd};
    }
    if (timeInput) {
        const now = new Date();
        const hh = String(now.getHours()).padStart(2,'0');
        const mi = String(now.getMinutes()).padStart(2,'0');
        timeInput.value = ${hh}:${mi};
    }
});
</script>
<script src="script .js"></script>
</body>
</html>
