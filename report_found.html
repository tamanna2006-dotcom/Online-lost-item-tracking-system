<!DOCTYPE html>
<html>
<head>
    <title>Report Found Item</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="form-box">
    <h2>Report Found Item</h2>
    <p>Please fill details carefully</p>

    <form onsubmit="return validateForm()">

        <h3>Contact Details</h3>

        <input type="email" placeholder="Email" required>
        <input type="tel" id="phone" placeholder="Phone (10 digits)" pattern="[0-9]{10}" maxlength="10" required>

        <h3>Item Details</h3>

        <input type="text" placeholder="Item Name" maxlength="30" required>

        <select required>
            <option value="">Select Category</option>
            <option>Mobile</option>
            <option>Wallet</option>
            <option>ID Card</option>
            <option>Bag</option>
        </select>

        <input type="text" placeholder="Location Found" maxlength="50" required>

        <!-- DATE -->
        <label>Date</label>
        <input type="date" id="date" readonly>

        <!-- TIME -->
        <label>Time</label>
        <input type="time" id="time" readonly>

        <textarea placeholder="Description" maxlength="150"></textarea>

        <button type="submit">Submit</button>
    </form>
</div>

<script src="script.js"></script>
</body>
</html>
